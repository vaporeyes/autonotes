# ABOUTME: Docker Compose stack for the Autonotes AI Orchestrator.
# ABOUTME: Runs FastAPI api, Celery worker, Redis broker, and PostgreSQL.

services:
  api:
    build: .
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app

  worker:
    build: .
    command: uv run celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autonotes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autonotes}
      POSTGRES_DB: ${POSTGRES_DB:-autonotes}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autonotes}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
